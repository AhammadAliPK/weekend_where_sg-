[build]
# Ultra memory-optimized build for Railway free tier with static adapter
buildCommand = "NODE_OPTIONS=--max-old-space-size=128 pnpm install --ignore-scripts && NODE_OPTIONS=--max-old-space-size=128 pnpm --filter web build"

[deploy]
# Production static file server via Express
# Railway will run: pnpm --filter web start -> node server.cjs
healthcheckPath = "/"

[env]
NODE_ENV = "production"
VITE_API_URL = "https://api-production-8b0d.up.railway.app/api"