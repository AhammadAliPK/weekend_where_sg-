[build]
# Ultra memory-optimized build for Railway free tier
buildCommand = "NODE_OPTIONS=--max-old-space-size=128 pnpm install --ignore-scripts && NODE_OPTIONS=--max-old-space-size=128 pnpm --filter web build"
watchPaths = ["apps/web/**", "packages/ui/**", "packages/types/**"]

[deploy]
# Minimal memory start for Railway free tier
startCommand = "NODE_OPTIONS=--max-old-space-size=128 pnpm --filter web start"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"

[env]
NODE_ENV = "production"
PORT = "3000"
HOST = "0.0.0.0"
VITE_API_URL = "https://api-production-8b0d.up.railway.app/api"
NODE_OPTIONS = "--max-old-space-size=128"