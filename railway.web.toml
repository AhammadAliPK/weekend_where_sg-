[build]
buildCommand = "cd apps/web && pnpm install && pnpm run build"
watchPaths = ["apps/web/**", "packages/ui/**", "packages/types/**"]

[deploy]
startCommand = "cd apps/web && pnpm run start"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"

[env]
NODE_ENV = "production"
PORT = "3000"
VITE_API_URL = "https://api-production-8b0d.up.railway.app/api"