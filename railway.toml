[build]
buildCommand = "pnpm install && pnpm --filter @weekend-where-sg/database build && pnpm --filter api build"
watchPaths = ["apps/api/**", "packages/database/**"]

[deploy]
startCommand = "node apps/api/dist/index.js"
healthcheckPath = "/api/health"
restartPolicyType = "ON_FAILURE"

[env]
NODE_ENV = "production"