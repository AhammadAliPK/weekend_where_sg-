[build]
# Build all workspace packages together to ensure proper linking
buildCommand = "pnpm install && pnpm run build --filter=@weekend-where-sg/database --filter=api"

[deploy]
startCommand = "node apps/api/dist/index.js"
healthcheckPath = "/api/health"
restartPolicyType = "ON_FAILURE"

[env]
NODE_ENV = "production"
NODE_OPTIONS = "--max-old-space-size=256"