[build]
buildCommand = "pnpm install --ignore-scripts && pnpm --filter @weekend-where-sg/database build --silent && pnpm --filter api build --silent"

[deploy]
startCommand = "node apps/api/dist/index.js"
healthcheckPath = "/api/health"
restartPolicyType = "ON_FAILURE"

[env]
NODE_ENV = "production"
NODE_OPTIONS = "--max-old-space-size=256"