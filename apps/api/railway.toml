[build]
# Install dependencies and build database package first, then API
buildCommand = "pnpm install && ls -la packages/database/ && pnpm --filter @weekend-where-sg/database build && ls -la packages/database/dist/ && pnpm --filter api build"

[deploy]
startCommand = "node apps/api/dist/index.js"
healthcheckPath = "/api/health"
restartPolicyType = "ON_FAILURE"

[env]
NODE_ENV = "production"
NODE_OPTIONS = "--max-old-space-size=256"