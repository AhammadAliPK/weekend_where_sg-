# Sprint Plan - WeekendWhere SG
# This file tracks progress on epics and stories for both the 90-minute demo and full product

# ============================================
# GLOBAL CONFIGURATION
# ============================================
metadata:
  total_epics: 6
  total_stories: 42
  demo_stories: 28  # Stories allocated for 90-minute demo
  full_product_stories: 42  # All stories for complete product

  time_allocation:
    ninety_minute_demo: "90 minutes"
    epic_1_foundation: "15 minutes"
    epic_2_discovery: "20 minutes"
    epic_3_scoring: "20 minutes"
    epic_4_data: "10 minutes"
    epic_5_ux: "30 minutes"
    epic_6_advanced: "Deferred (post-training)"

  demo_priority: "high"  # Focus on demo-critical stories first
  full_product_priority: "medium"  # Complete all stories post-demo

# ============================================
# CODE REVIEW CREW FEEDBACK
# ============================================
code_review_feedback:
  critical_gaps:
    - story_required: "Input validation & sanitization"
      epic: "Epic 2"
      priority: "HIGH"
      reason: "Security - prevent XSS, injection attacks on /api/recommendations"

    - story_required: "Timeout & circuit breaker handling"
      epic: "Epic 4"
      priority: "HIGH"
      reason: "Prevent API hangs from breaking demo"

    - story_required: "Request cancellation for rapid selector changes"
      epic: "Epic 3"
      priority: "HIGH"
      reason: "Race condition - prevent stale recommendations"

    - story_required: "Deploy & smoke test verification"
      epic: "Epic 5"
      priority: "CRITICAL"
      reason: "Prove app works outside localhost"

  optimization_suggestions:
    - suggestion: "Combine Epic 1 setup stories into 1-2 stories"
      rationale: "Use SvelteKit template instead of manual Turborepo setup"
      time_savings: "10-15 minutes"

    - suggestion: "Merge Epic 2 and Epic 3 stories"
      rationale: "Selectors + API + Scoring are one feature from different angles"
      time_savings: "5-10 minutes"

    - suggestion: "Start with mobile-only, defer desktop/tablet"
      rationale: "Reduce responsive layout complexity for demo"
      time_savings: "5 minutes"

  edge_cases_identified:
    - "Rapid selector changes (< 300ms) - multiple pending requests"
    - "Zero results from API - proper empty state handling"
    - "API 500 errors - graceful degradation"
    - "API timeouts - circuit breaker"
    - "Malformed JSON responses - error handling"
    - "NaN scores from bad data - validation"
    - "Location permission denied - fallback to selector"
    - "localStorage full/disabled - error handling"
    - "Slow networks - progressive loading"
    - "Weather/air quality API hangs - graceful degradation"
    - "Fallback data missing/corrupt - verification"

