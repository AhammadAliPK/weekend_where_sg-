      acceptance_criteria:
        - "Function: scoring(parkData, userPreferences) => { score, verdict, reasons }"
        - "Pure function (no side effects, no external dependencies)"
        - "Deterministic (same inputs = same outputs)"
        - "Unit testable without mocking"
        - "Follows PRD scoring rules (base + region + activity + preference)"
        - "Verdict mapping: 9+ = Perfect, 7-8 = Great, 5-6 = Good, 3-4 = Okay, <3 = Poor"
        - "Located in apps/api/src/services/scoring.ts"
